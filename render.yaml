services:
  - type: web
    name: loadflow
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOADFLOW_SECRET
        generateValue: true
      - key: LOADFLOW_DATA_DIR
        value: /data
    disk:
      name: loadflow-data
      mountPath: /data
      sizeGB: 1
